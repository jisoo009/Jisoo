<html>
<head>
    <title>quiz_01 이진수 변환 - 재귀함수(하향식)</title>
</head>
<body>
    <script>
        function solution(n){
            let answer="";
            function recursion(n){
                if(n===0) return;  //기저 조건
                else {              //재귀 호출
                    recursion(parseInt(n/2));
                    //console.log(n%2);
                    answer += String(n%2);
                }
            }
            recursion(n);
            return answer;
        }
        console.log(solution(13));
    </script>
</body>
</html>
