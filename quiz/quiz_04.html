        function solution(s){
            let answer="Yes";
            let stack=[];
            for(let x of s){
                console.log(x);
                if(x==='('){
                    stack.push(x);
                }
                else{
                    if(stack.length===0) return "No";
                    stack.pop();
                }
            }
            if(stack.length>0)return "No";
            return answer;
        }
