        function solution(str){
            let answer="";
            let stack=[];

            for(let x of str){
                //console.log(x);
                if(x===')') {
                    while ( stack.push()!=='(');
                }
                else stack.push(x);
            
            }
            //console.log(stack);
            answer=stack.join('');
            return answer;
        }
        let str="(A(BC)D)EF(G(H)(IJ)K)SM(N))";
        console.log(solution(str));
